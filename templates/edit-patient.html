{% extends "base.html" %}
{% block title %}Edit {{ patient.full_name }} — Priority Care{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">Edit Patient — {{ patient.patient_id_display() }}</div>
  <a href="/patients/{{ patient.id }}" class="btn btn-secondary">← Cancel</a>
</div>

<div class="card">
  <div class="card-title">Update Patient Information</div>

  <div class="form-row">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="edit-full_name" value="{{ patient.full_name }}" />
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" id="edit-age" value="{{ patient.age }}" min="0" max="120" />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Pain Level (0–10)</label>
      <input type="number" id="edit-pain_level" value="{{ patient.pain_level }}" min="0" max="10" />
    </div>
    <div class="form-group">
      <label>Respiratory Rate</label>
      <input type="number" id="edit-resp_rate" value="{{ patient.resp_rate or '' }}" />
    </div>
  </div>

  <div class="form-row-3">
    <div class="form-group">
      <label>Heart Rate</label>
      <input type="number" id="edit-heart_rate" value="{{ patient.heart_rate or '' }}" />
    </div>
    <div class="form-group">
      <label>Oxygen Saturation (%)</label>
      <input type="number" id="edit-oxygen_sat" value="{{ patient.oxygen_sat or '' }}" step="0.1" />
    </div>
    <div class="form-group">
      <label>BP Systolic</label>
      <input type="number" id="edit-bp_systolic" value="{{ patient.bp_systolic or '' }}" />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>BP Diastolic</label>
      <input type="number" id="edit-bp_diastolic" value="{{ patient.bp_diastolic or '' }}" />
    </div>
  </div>

  <div class="form-group">
    <label>Symptoms / Notes</label>
    <textarea id="edit-symptoms" rows="3">{{ patient.symptoms or '' }}</textarea>
  </div>

  <div id="save-error" style="display:none; color:#c0392b; margin-bottom:12px;"></div>

  <div style="display:flex; gap:12px; margin-top:8px;">
    <button id="save-btn" class="btn btn-primary" data-patient-id="{{ patient.id }}">💾 Save Changes</button>
    <a href="/patients/{{ patient.id }}" class="btn btn-secondary">Cancel</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/scripts/patient-detail.js"></script>
<script>
  // After save, redirect to detail page
  const origSave = window.savePatientEdits;
  document.getElementById('save-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    const pid = '{{ patient.id }}';
    await savePatientEdits(pid);
    // Redirect on success after short delay
    setTimeout(() => { window.location.href = '/patients/' + pid; }, 800);
  });
</script>
{% endblock %}
